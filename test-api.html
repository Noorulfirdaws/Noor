<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Taxi API Tester</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 30px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    button:hover { background: #45a049; }
    .result { margin-top: 15px; padding: 15px; background: #fff; border-radius: 5px; border-left: 4px solid #4CAF50; white-space: pre-wrap; font-family: monospace; }
    .error { border-left-color: #f44336; }
  </style>
</head>
<body>
  <h1>🚕 Taxi Platform API Tester</h1>

  <h2>Register</h2>
  <input id="reg-name" placeholder="Full Name" value="John Doe" />
  <input id="reg-email" placeholder="Email" value="john@example.com" />
  <input id="reg-password" placeholder="Password" value="password123" />
  <button onclick="register()">Register</button>
  <div id="reg-result" class="result" style="display:none"></div>

  <h2>Login</h2>
  <input id="login-email" placeholder="Email" value="john@example.com" />
  <input id="login-password" placeholder="Password" value="password123" />
  <button onclick="login()" style="background:#2196F3">Login</button>
  <div id="login-result" class="result" style="display:none"></div>

  <script>
    const API = 'http://localhost:3000/api/auth';

    async function register() {
      const body = {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value
      };
      const div = document.getElementById('reg-result');
      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        div.style.display = 'block';
        div.className = res.ok ? 'result' : 'result error';
        div.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        div.style.display = 'block';
        div.className = 'result error';
        div.textContent = 'Error: Make sure server is running on port 3000';
      }
    }

    async function login() {
      const body = {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      };
      const div = document.getElementById('login-result');
      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        div.style.display = 'block';
        div.className = res.ok ? 'result' : 'result error';
        div.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        div.style.display = 'block';
        div.className = 'result error';
        div.textContent = 'Error: Make sure server is running on port 3000';
      }
    }
  </script>
</body>
</html>
