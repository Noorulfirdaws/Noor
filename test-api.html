<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Djib Taxi API Tester</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 30px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; background: #4CAF50; }
    .result { margin-top: 15px; padding: 15px; background: #fff; border-radius: 5px; border-left: 4px solid #4CAF50; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
    .error { border-left-color: #f44336; }
    #token-display { background: #fff3cd; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>🚕 Djib Taxi API Tester</h1>
  <div id="token-display">Token: <span id="token-val">Not logged in</span></div>

  <h2>1. Register</h2>
  <input id="reg-name" placeholder="Full Name" value="Noor" />
  <input id="reg-email" placeholder="Email" value="noor@djibtaxi.com" />
  <input id="reg-password" placeholder="Password" value="password123" />
  <button onclick="doRegister()">Register</button>
  <div id="reg-result" class="result" style="display:none"></div>

  <h2>2. Login</h2>
  <input id="login-email" placeholder="Email" value="noor@djibtaxi.com" />
  <input id="login-password" placeholder="Password" value="password123" />
  <button onclick="doLogin()" style="background:#2196F3">Login</button>
  <div id="login-result" class="result" style="display:none"></div>

  <h2>3. Request a Trip</h2>
  <input id="pickup" placeholder="Pickup Location" value="Place Menelik, Djibouti" />
  <input id="dropoff" placeholder="Dropoff Location" value="Aéroport de Djibouti" />
  <button onclick="doRequestTrip()" style="background:#FF9800">Request Trip</button>
  <div id="trip-result" class="result" style="display:none"></div>

  <h2>4. Get All Trips</h2>
  <button onclick="doGetTrips()" style="background:#9C27B0">Get All Trips</button>
  <div id="trips-result" class="result" style="display:none"></div>

  <script>
    var API = 'http://localhost:3000/api';
    var token = '';

    function getHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
    }

    function showResult(id, data, ok) {
      var div = document.getElementById(id);
      div.style.display = 'block';
      div.className = ok ? 'result' : 'result error';
      div.textContent = JSON.stringify(data, null, 2);
    }

    function doRegister() {
      var body = {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value
      };
      fetch(API + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        .then(function(res) { return res.json().then(function(data) { return { data: data, ok: res.ok }; }); })
        .then(function(r) {
          if (r.data.token) { token = r.data.token; document.getElementById('token-val').textContent = token.substring(0, 50) + '...'; }
          showResult('reg-result', r.data, r.ok);
        })
        .catch(function() { showResult('reg-result', { error: 'Server not running' }, false); });
    }

    function doLogin() {
      var body = {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      };
      fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
        .then(function(res) { return res.json().then(function(data) { return { data: data, ok: res.ok }; }); })
        .then(function(r) {
          if (r.data.token) { token = r.data.token; document.getElementById('token-val').textContent = token.substring(0, 50) + '...'; }
          showResult('login-result', r.data, r.ok);
        })
        .catch(function() { showResult('login-result', { error: 'Server not running' }, false); });
    }

    function doRequestTrip() {
      var body = {
        pickupLocation: document.getElementById('pickup').value,
        dropoffLocation: document.getElementById('dropoff').value
      };
      fetch(API + '/trips/request', { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) })
        .then(function(res) { return res.json().then(function(data) { return { data: data, ok: res.ok }; }); })
        .then(function(r) { showResult('trip-result', r.data, r.ok); })
        .catch(function() { showResult('trip-result', { error: 'Server not running' }, false); });
    }

    function doGetTrips() {
      fetch(API + '/trips', { headers: getHeaders() })
        .then(function(res) { return res.json().then(function(data) { return { data: data, ok: res.ok }; }); })
        .then(function(r) { showResult('trips-result', r.data, r.ok); })
        .catch(function() { showResult('trips-result', { error: 'Server not running' }, false); });
    }
  </script>
</body>
</html>
